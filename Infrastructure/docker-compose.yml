version: '3.8'

services:
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    image: grafana-image:${IMAGE_TAG}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana-data:
